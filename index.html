<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Objetivos - Análisis Multivariado</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #56628d;
      --border: #cfd3dc;
      --text: #2a2a2a;
      --white: #ffffff;
      --overlay: rgba(31, 35, 50, 0.62);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Poppins", sans-serif;
      background: #ffffff;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    .section-header {
      width: min(100%, 1220px);
      margin: 0 auto 2.5rem;
      text-align: right;
    }

    .section-header p {
      margin: 0;
      color: var(--primary);
      font-size: 0.85rem;
      line-height: 1.5;
      font-weight: 500;
      font-family: "Poppins", sans-serif;
    }

    .cards-section {
      width: min(100%, 1220px);
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 2rem 1.5rem;
    }

    .info-card {
      position: relative;
      background: var(--white);
      border: 2px solid var(--border);
      border-top: 10px solid var(--primary);
      border-radius: 6px;
      min-height: 200px;
      padding: 48px 16px 28px;
      box-shadow: 0 12px 26px rgba(86, 98, 141, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: visible;
      transition:
        transform 0.28s ease,
        box-shadow 0.28s ease,
        border-color 0.28s ease;
      cursor: pointer;
    }

    .info-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(86, 98, 141, 0.055);
      opacity: 0;
      transition: opacity 0.28s ease;
      pointer-events: none;
      border-radius: 4px;
    }

    .info-card:hover,
    .info-card:focus-within {
      transform: translateY(-8px);
      border-color: var(--primary);
      box-shadow: 0 20px 40px rgba(86, 98, 141, 0.24);
    }

    .info-card:hover::before,
    .info-card:focus-within::before {
      opacity: 1;
    }

    .card-number {
      position: absolute;
      top: -39px;
      left: 50%;
      transform: translateX(-50%);
      width: 78px;
      height: 78px;
      border-radius: 50%;
      background: var(--primary);
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
      z-index: 2;
      font-family: "Poppins", sans-serif;
      transition:
        transform 0.28s ease,
        box-shadow 0.28s ease;
    }

    .info-card:hover .card-number,
    .info-card:focus-within .card-number {
      transform: translateX(-50%) scale(1.08);
      box-shadow: 0 12px 24px rgba(86, 98, 141, 0.32);
    }

    .objective-button {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      min-height: 120px;
      border: 0;
      background: transparent;
      color: var(--text);
      font-family: "Poppins", sans-serif;
      font-size: 22px;
      line-height: 1.3;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
      padding: 0;
      transition:
        color 0.28s ease,
        transform 0.28s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      word-break: break-word;
    }

    .objective-button:hover,
    .objective-button:focus-visible {
      color: var(--primary);
      outline: none;
      transform: translateY(-2px);
    }

    .card-small {
      grid-column: span 2;
    }

    .card-large {
      grid-column: span 3;
    }

    /* ===== MODAL ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: var(--overlay);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 1000;
    }

    .modal-overlay.is-open {
      display: flex;
    }

    .modal-content {
      position: relative;
      width: min(100%, 760px);
      background: var(--white);
      border: 2px solid var(--border);
      border-top: 10px solid var(--primary);
      border-radius: 8px;
      padding: 54px 42px 42px;
      box-shadow: 0 28px 70px rgba(31, 35, 50, 0.34);
      animation: modalIn 0.25s ease;
      font-family: "Poppins", sans-serif;
    }

    .modal-number {
      position: absolute;
      top: -43px;
      left: 50%;
      transform: translateX(-50%);
      width: 86px;
      height: 86px;
      border-radius: 50%;
      background: var(--primary);
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 31px;
      font-weight: 700;
      font-family: "Poppins", sans-serif;
    }

    .modal-title {
      margin: 0 0 20px;
      color: var(--primary);
      font-size: 34px;
      line-height: 1.25;
      font-weight: 700;
      text-align: center;
      font-family: "Poppins", sans-serif;
    }

    .modal-text {
      margin: 0;
      color: var(--text);
      font-size: 24px;
      line-height: 1.6;
      font-weight: 400;
      text-align: left;
      font-family: "Poppins", sans-serif;
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 18px;
      width: 42px;
      height: 42px;
      border: 0;
      border-radius: 50%;
      background: rgba(86, 98, 141, 0.1);
      color: var(--primary);
      font-size: 30px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition:
        background-color 0.25s ease,
        transform 0.25s ease;
      font-family: "Poppins", sans-serif;
    }

    .modal-close:hover,
    .modal-close:focus-visible {
      background: rgba(86, 98, 141, 0.18);
      transform: scale(1.06);
      outline: none;
    }

    body.modal-active {
      overflow: hidden;
    }

    @keyframes modalIn {
      from {
        opacity: 0;
        transform: translateY(18px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 1024px) {
      .cards-section {
        grid-template-columns: repeat(2, 1fr);
      }

      .card-small,
      .card-large {
        grid-column: span 1;
      }

      .objective-button {
        font-size: 20px;
        min-height: 100px;
      }
    }

    @media (max-width: 768px) {
      body {
        padding: 1.5rem 1rem;
      }

      .section-header p {
        font-size: 0.75rem;
      }

      .cards-section {
        gap: 2rem 1.2rem;
      }

      .objective-button {
        font-size: 18px;
        min-height: 90px;
      }

      .card-number {
        width: 60px;
        height: 60px;
        top: -30px;
        font-size: 22px;
      }
    }

    @media (max-width: 480px) {
      .section-header {
        text-align: center;
      }

      .section-header p {
        font-size: 0.7rem;
      }

      .cards-section {
        grid-template-columns: 1fr;
        gap: 2rem;
        max-width: 320px;
      }

      .card-small,
      .card-large {
        grid-column: span 1;
      }

      .info-card {
        min-height: 160px;
        padding: 44px 16px 28px;
      }

      .objective-button {
        font-size: 18px;
        min-height: 80px;
      }

      .card-number {
        width: 56px;
        height: 56px;
        top: -28px;
        font-size: 20px;
      }

      .modal-content {
        padding: 48px 24px 32px;
      }

      .modal-number {
        width: 72px;
        height: 72px;
        top: -36px;
        font-size: 26px;
      }

      .modal-title {
        font-size: 27px;
      }

      .modal-text {
        font-size: 18px;
        line-height: 1.55;
      }
    }
  </style>
</head>

<body>

  <header class="section-header">
    <p>Haga clic sobre la Tarjeta para ampliar la información.</p>
  </header>

  <section class="cards-section">
    <!-- Objetivo 1 -->
    <article class="info-card card-small" onclick="openModalFromCard(this)">
      <div class="card-number">1</div>
      <button
        class="objective-button"
        type="button"
        data-number="1"
        data-title="Objetivo 1"
        data-text="Reconocer y explicar los fundamentos conceptuales del análisis estadístico multivariado y su diferencia frente al análisis univariado y bivariado."
      >
        Objetivo 1
      </button>
    </article>

    <!-- Objetivo 2 -->
    <article class="info-card card-small" onclick="openModalFromCard(this)">
      <div class="card-number">2</div>
      <button
        class="objective-button"
        type="button"
        data-number="2"
        data-title="Objetivo 2"
        data-text="Representar y manipular datos multivariados mediante notación vectorial y matricial, utilizando adecuadamente matrices de varianzas y covarianzas."
      >
        Objetivo 2
      </button>
    </article>

    <!-- Objetivo 3 -->
    <article class="info-card card-small" onclick="openModalFromCard(this)">
      <div class="card-number">3</div>
      <button
        class="objective-button"
        type="button"
        data-number="3"
        data-title="Objetivo 3"
        data-text="Analizar la estructura de dependencia entre variables a través de medidas de asociación multivariada."
      >
        Objetivo 3
      </button>
    </article>

    <!-- Objetivo 4 -->
    <article class="info-card card-large" onclick="openModalFromCard(this)">
      <div class="card-number">4</div>
      <button
        class="objective-button"
        type="button"
        data-number="4"
        data-title="Objetivo 4"
        data-text="Evaluar los supuestos fundamentales del análisis multivariado, en particular la normalidad multivariada, y su impacto en la aplicación de métodos inferenciales."
      >
        Objetivo 4
      </button>
    </article>

    <!-- Objetivo 5 -->
    <article class="info-card card-large" onclick="openModalFromCard(this)">
      <div class="card-number">5</div>
      <button
        class="objective-button"
        type="button"
        data-number="5"
        data-title="Objetivo 5"
        data-text="Interpretar gráficamente la distribución conjunta de variables mediante herramientas como diagramas de dispersión multivariados y curvas de nivel."
      >
        Objetivo 5
      </button>
    </article>
  </section>

  <!-- ===== MODAL ===== -->
  <div class="modal-overlay" id="objectiveModal" aria-hidden="true">
    <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-number" id="modalNumber">1</div>

      <button class="modal-close" type="button" id="modalClose" aria-label="Cerrar modal">
        &times;
      </button>

      <h2 class="modal-title" id="modalTitle">Objetivo 1</h2>
      <p class="modal-text" id="modalText"></p>
    </div>
  </div>

  <script>
    const modal = document.getElementById("objectiveModal");
    const modalNumber = document.getElementById("modalNumber");
    const modalTitle = document.getElementById("modalTitle");
    const modalText = document.getElementById("modalText");
    const modalClose = document.getElementById("modalClose");
    const objectiveButtons = document.querySelectorAll(".objective-button");

    let lastFocusedButton = null;

    function openModalFromCard(card) {
      const button = card.querySelector(".objective-button");
      if (button) {
        openModal(button);
      }
    }

    function openModal(button) {
      lastFocusedButton = button;

      modalNumber.textContent = button.dataset.number;
      modalTitle.textContent = button.dataset.title;
      modalText.textContent = button.dataset.text;

      modal.classList.add("is-open");
      modal.setAttribute("aria-hidden", "false");
      document.body.classList.add("modal-active");

      modalClose.focus();
    }

    function closeModal() {
      modal.classList.remove("is-open");
      modal.setAttribute("aria-hidden", "true");
      document.body.classList.remove("modal-active");

      if (lastFocusedButton) {
        lastFocusedButton.focus();
      }
    }

    objectiveButtons.forEach((button) => {
      button.addEventListener("click", (e) => {
        e.stopPropagation();
        openModal(button);
      });
    });

    modalClose.addEventListener("click", closeModal);

    modal.addEventListener("click", (event) => {
      if (event.target === modal) {
        closeModal();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && modal.classList.contains("is-open")) {
        closeModal();
      }
    });
  </script>

</body>
</html>
